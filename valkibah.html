<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Grupo Valkibah · Planeador</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --teal-900:#0a3d3d;--teal-800:#0f5252;--teal-700:#1a7a7a;
  --teal-600:#2aacac;--teal-400:#40d9c0;--teal-200:#a8f0e8;
  --teal-100:#d0f5f0;--teal-50:#e8fafa;
  --mint:#7fffd4;--black:#0d0d0d;--white:#ffffff;
  --event-bg:#b2f0e8;
  --locked-stripe:repeating-linear-gradient(45deg,#e0e0e0 0px,#e0e0e0 4px,#ececec 4px,#ececec 10px);
  --pm:#0e6b6b;--pa:#7fffd4;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--teal-900);color:var(--white);min-height:100vh}
.screen{display:none}
.screen.active{display:flex;flex-direction:column;min-height:100vh}

/* HOME */
#screen-home{background:linear-gradient(160deg,var(--teal-900) 0%,#0a2e2e 100%);align-items:center;justify-content:flex-start;padding:0}
.home-hero{width:100%;padding:48px 24px 32px;text-align:center;background:linear-gradient(180deg,rgba(0,0,0,.35) 0%,transparent 100%)}
.home-logo{width:64px;height:64px;background:linear-gradient(135deg,var(--teal-700),var(--teal-400));border-radius:20px;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:26px;color:#fff;margin:0 auto 16px;box-shadow:0 8px 32px rgba(64,217,192,.3)}
.home-title{font-family:'DM Serif Display',serif;font-size:28px;color:#fff;margin-bottom:6px}
.home-sub{font-size:13px;color:var(--teal-400);letter-spacing:.12em;text-transform:uppercase}
.home-cards{width:100%;max-width:520px;margin:0 auto;padding:24px 16px 40px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.person-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:22px 16px;cursor:pointer;transition:all .2s;text-align:center;-webkit-tap-highlight-color:transparent}
.person-card:hover,.person-card:active{transform:translateY(-3px);border-color:var(--teal-400);background:rgba(64,217,192,.12)}
.person-card .card-emoji{font-size:32px;margin-bottom:10px}
.person-card .card-name{font-size:14px;font-weight:700;color:#fff;margin-bottom:3px}
.person-card .card-role{font-size:11px;color:var(--teal-400);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.person-card .card-sched{font-size:10px;color:var(--teal-200);opacity:.75}

/* APP */
#screen-app{background:var(--teal-50);color:var(--black)}
.app-header{background:var(--black);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--teal-700);position:sticky;top:0;z-index:100;flex-shrink:0}
.logo-area{display:flex;align-items:center;gap:10px}
.logo-circle{width:36px;height:36px;background:linear-gradient(135deg,var(--teal-700),var(--teal-400));border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:15px;color:#fff}
.brand-name{font-family:'DM Serif Display',serif;font-size:16px;color:#fff;letter-spacing:.04em}
.header-right{display:flex;align-items:center;gap:8px}
.person-badge{background:var(--pm);color:#fff;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap}
.back-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:8px;padding:6px 10px;font-size:13px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.app-body{display:grid;grid-template-columns:280px 1fr;flex:1;overflow:hidden}
.sidebar{background:var(--teal-800);border-right:1px solid var(--teal-700);padding:20px 18px;display:flex;flex-direction:column;gap:18px;overflow-y:auto}
.sidebar-title{font-family:'DM Serif Display',serif;font-size:16px;color:var(--teal-400);padding-bottom:10px;border-bottom:1px solid var(--teal-700)}
.nav-tabs{display:flex;flex-direction:column;gap:3px}
.nav-tab{background:transparent;border:1px solid transparent;color:var(--teal-200);padding:9px 12px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;text-align:left;transition:all .15s;-webkit-tap-highlight-color:transparent}
.nav-tab:hover{background:var(--teal-700);color:#fff}
.nav-tab.active{background:var(--pm);color:#fff;border-color:var(--teal-400)}
.month-selector{display:flex;flex-direction:column;gap:5px}
.month-selector label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--teal-400)}
.month-selector select{background:var(--teal-900);color:#fff;border:1px solid var(--teal-600);padding:9px 11px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;outline:none}
.activity-list{display:flex;flex-direction:column;gap:4px;max-height:220px;overflow-y:auto}
.activity-chip{background:var(--teal-900);border:1px solid var(--teal-700);border-radius:7px;padding:6px 10px;font-size:12px;color:var(--teal-200);cursor:pointer;transition:all .13s;display:flex;align-items:center;gap:6px}
.activity-chip:hover{border-color:var(--teal-400);color:#fff}
.activity-chip .dot{width:6px;height:6px;border-radius:50%;background:var(--teal-400);flex-shrink:0}
.main-area{background:var(--teal-50);color:var(--black);overflow-y:auto;overflow-x:hidden}
.view{display:none;padding:24px}
.view.active{display:block}

/* FORM */
.form-card{background:#fff;border-radius:14px;padding:28px;max-width:640px;box-shadow:0 4px 28px rgba(26,122,122,.11)}
.form-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--teal-800);margin-bottom:4px}
.form-sub{font-size:13px;color:var(--teal-600);margin-bottom:22px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group.full{grid-column:1/-1}
.form-group label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--teal-700)}
.form-group input,.form-group select,.form-group textarea{background:var(--teal-50);border:1.5px solid var(--teal-200);border-radius:8px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--teal-900);outline:none;transition:border-color .14s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--teal-600)}
.form-group textarea{resize:vertical;min-height:70px}
.btn-row{display:flex;gap:10px;margin-top:22px;flex-wrap:wrap}
.btn{padding:10px 22px;border-radius:9px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;transition:all .16s;-webkit-tap-highlight-color:transparent}
.btn-primary{background:var(--pm);color:#fff}
.btn-primary:hover{filter:brightness(1.15);transform:translateY(-1px)}
.btn-secondary{background:var(--teal-100);color:var(--teal-800)}
.btn-secondary:hover{background:var(--teal-200)}
.btn-danger{background:#fee2e2;color:#c0392b}
.btn-danger:hover{background:#fecaca}
.status-group{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}
.status-opt{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .15s;-webkit-tap-highlight-color:transparent}
.status-opt:hover{transform:scale(1.04)}
.status-opt.sel{border-color:var(--black)!important;transform:scale(1.06)}
.s-pendiente{background:#fff3cd;color:#856404}
.s-en-progreso{background:#cfe2ff;color:#084298}
.s-completada{background:#d1e7dd;color:#0f5132}
.s-bloqueada{background:#f8d7da;color:#842029}

/* CALENDAR GRID */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.cal-title{font-family:'DM Serif Display',serif;font-size:24px;color:var(--teal-800)}
.cal-actions{display:flex;gap:8px}
.week-block{margin-bottom:24px}
.week-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--teal-600);margin-bottom:6px;padding-left:2px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.week-locked-badge{background:#aaa;color:#fff;font-size:9px;padding:2px 7px;border-radius:10px}
.week-current-badge{background:var(--pm);color:#fff;font-size:9px;padding:2px 7px;border-radius:10px}
.week-next-badge{background:var(--teal-600);color:#fff;font-size:9px;padding:2px 7px;border-radius:10px}
.cal-grid{background:#fff;border-radius:11px;overflow:hidden;box-shadow:0 2px 14px rgba(26,122,122,.07);border:1px solid var(--teal-200)}

/* Fixed column layout via table */
.cal-table{width:100%;border-collapse:collapse;table-layout:fixed}
.cal-table colgroup col:first-child{width:58px}
.cal-th{background:var(--teal-800);color:#fff;font-weight:600;font-size:9px;text-align:center;letter-spacing:.07em;text-transform:uppercase;padding:9px 3px;border-right:1px solid var(--teal-700);vertical-align:top}
.cal-th.event-day{background:var(--teal-700)}
.cal-th .day-date{font-size:15px;font-weight:700;display:block;margin-top:2px;color:var(--teal-400)}
.cal-th.event-day .day-date{color:var(--mint)}
.cal-th-hour{background:var(--teal-900);color:var(--teal-400);font-weight:700;font-size:10px;border-right:2px solid var(--teal-600)}
.cal-td{font-size:11px;border-right:1px solid var(--teal-100);border-bottom:1px solid var(--teal-100);vertical-align:top;position:relative;height:46px;padding:2px 3px;overflow:hidden}
.cal-td:last-child{border-right:none}
.cal-td.event-day{background:var(--event-bg)!important}
.cal-td.locked{background:var(--locked-stripe)!important;cursor:not-allowed;pointer-events:none}
.cal-td.editable{cursor:pointer;transition:background .1s}
.cal-td.editable:hover{background:var(--teal-50)!important}
.cal-td.drag-over{background:rgba(64,217,192,.25)!important;outline:2px dashed var(--teal-400);outline-offset:-2px}
.cal-td.out-month{background:#f4f4f4!important;color:#ccc}
.cal-td.span-occupied{padding:0;overflow:visible}

/* all-day row */

/* pills */
.pill{display:block;border-radius:4px;font-size:9px;font-weight:700;padding:2px 5px;margin-bottom:2px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;box-sizing:border-box;line-height:1.4;transition:opacity .13s;color:#fff;position:relative}
.pill:hover{opacity:.85}
.pill-del{position:absolute;right:2px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.25);border:none;border-radius:50%;width:12px;height:12px;font-size:7px;cursor:pointer;color:#fff;display:none;align-items:center;justify-content:center;padding:0;line-height:1}
.pill:hover .pill-del{display:flex}
/* spanning pill: fills rowspan visually */
.pill-span{position:absolute;left:2px;right:2px;top:2px;border-radius:5px;font-size:10px;font-weight:700;padding:4px 6px;cursor:pointer;overflow:hidden;color:#fff;z-index:3;display:flex;flex-direction:column;gap:2px;white-space:normal;word-break:break-word;box-sizing:border-box}
.pill-span .pill-span-time{font-size:8px;opacity:.85;margin-top:2px}
.pill-span .pill-del{position:absolute;top:4px;right:4px;display:none}
.pill-span:hover .pill-del{display:flex}
/* all-day pill */

/* status colors on pills */
.ps-pendiente{background:#856404}
.ps-en-progreso{background:#084298}
.ps-completada{background:#0f5132}
.ps-bloqueada{background:#842029}
.ps-default{background:var(--pm)}

/* REGISTRO */
.registro-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.reg-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.reg-table{background:#fff;border-radius:11px;overflow:hidden;box-shadow:0 2px 14px rgba(26,122,122,.07);border:1px solid var(--teal-200);width:100%;border-collapse:collapse}
.reg-table th{background:var(--teal-800);color:#fff;padding:10px 13px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;text-align:left;border-right:1px solid var(--teal-700)}
.reg-table td{padding:9px 13px;font-size:13px;color:var(--teal-900);border-right:1px solid var(--teal-100);border-bottom:1px solid var(--teal-100)}
.reg-table tr:nth-child(even) td{background:var(--teal-50)}
.reg-table tr:hover td{background:var(--teal-100)}
.del-row-btn{background:none;border:none;cursor:pointer;color:#e05555;font-size:13px;padding:2px 5px;border-radius:4px}
.edit-row-btn{background:none;border:none;cursor:pointer;color:var(--teal-600);font-size:13px;padding:2px 5px;border-radius:4px}
.status-badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:10px;font-weight:700}
.sb-pendiente{background:#fff3cd;color:#856404}
.sb-en-progreso{background:#cfe2ff;color:#084298}
.sb-completada{background:#d1e7dd;color:#0f5132}
.sb-bloqueada{background:#f8d7da;color:#842029}
.empty-state{text-align:center;padding:50px 20px;color:var(--teal-600)}
.empty-state .big-icon{font-size:42px;margin-bottom:10px}

/* KANBAN */
.kanban-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.kanban-board{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start}
.kanban-col{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 14px rgba(26,122,122,.07);border:1px solid var(--teal-200)}
.kanban-col-header{padding:12px 14px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;justify-content:space-between}
.kanban-col-body{padding:10px;display:flex;flex-direction:column;gap:8px;min-height:80px}
.kh-pendiente{background:#fff3cd;color:#856404;border-bottom:2px solid #ffc107}
.kh-en-progreso{background:#cfe2ff;color:#084298;border-bottom:2px solid #0d6efd}
.kh-completada{background:#d1e7dd;color:#0f5132;border-bottom:2px solid #198754}
.kh-bloqueada{background:#f8d7da;color:#842029;border-bottom:2px solid #dc3545}
.kanban-card{background:var(--teal-50);border:1px solid var(--teal-200);border-radius:8px;padding:10px 12px;font-size:12px;cursor:grab;transition:all .15s;-webkit-tap-highlight-color:transparent;user-select:none}
.kanban-card:active{cursor:grabbing}
.kanban-card.dragging{opacity:.4}
.kanban-col-body.kanbandrop{background:rgba(64,217,192,.12);outline:2px dashed var(--teal-400);border-radius:0 0 12px 12px}
.kanban-card .kc-name{font-weight:700;color:var(--teal-900);margin-bottom:3px}
.kanban-card .kc-date{font-size:10px;color:var(--teal-600)}
.kanban-count{background:rgba(0,0,0,.12);border-radius:10px;padding:1px 7px;font-size:11px}

/* IDEAS */
.ideas-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.ideas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-top:6px}
.idea-card{background:#fff;border-radius:12px;padding:16px;border:1px solid var(--teal-200);box-shadow:0 2px 10px rgba(26,122,122,.06);position:relative}
.idea-card .idea-title{font-weight:700;font-size:14px;color:var(--teal-800);margin-bottom:5px}
.idea-card .idea-body{font-size:13px;color:#555;line-height:1.5}
.idea-card .idea-date{font-size:10px;color:#aaa;margin-top:8px}
.idea-card .idea-del{position:absolute;top:10px;right:10px;background:none;border:none;cursor:pointer;color:#ccc;font-size:14px}
.idea-card .idea-del:hover{color:#e05555}
.idea-form{background:#fff;border-radius:14px;padding:22px;max-width:560px;border:1px solid var(--teal-200);box-shadow:0 2px 14px rgba(26,122,122,.08);margin-bottom:22px}
.idea-form input,.idea-form textarea{width:100%;background:var(--teal-50);border:1.5px solid var(--teal-200);border-radius:8px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--teal-900);outline:none;margin-top:6px}
.idea-form textarea{resize:vertical;min-height:80px}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;position:relative}
.modal-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--teal-800);margin-bottom:16px}
.modal-close{position:absolute;top:16px;right:16px;background:var(--teal-100);border:none;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--teal-800)}
.modal-info-row{display:flex;align-items:center;gap:8px;font-size:13px;color:#555;padding:5px 0}
.modal-info-row span:first-child{font-weight:600;color:var(--teal-700);min-width:80px}

/* PIN OVERLAY */
.pin-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;align-items:center;justify-content:center}
.pin-overlay.open{display:flex}
.pin-box{background:#fff;border-radius:20px;padding:36px 32px;max-width:320px;width:90%;text-align:center;box-shadow:0 16px 60px rgba(0,0,0,.35)}
.pin-box-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--teal-800);margin-bottom:6px}
.pin-box-sub{font-size:13px;color:#888;margin-bottom:22px}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:22px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--teal-400);transition:background .15s}
.pin-dot.filled{background:var(--teal-600);border-color:var(--teal-700)}
.pin-numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.pin-key{background:var(--teal-50);border:1.5px solid var(--teal-200);border-radius:12px;padding:14px;font-size:20px;font-weight:700;color:var(--teal-900);cursor:pointer;transition:all .12s;-webkit-tap-highlight-color:transparent}
.pin-key:hover{background:var(--teal-100);transform:scale(1.04)}
.pin-key:active{transform:scale(.97)}
.pin-key.del-key{font-size:16px;color:var(--teal-700)}
.pin-key.ok-key{background:var(--pm);color:#fff;border-color:var(--pm)}
.pin-error{font-size:12px;color:#c0392b;min-height:16px;font-weight:600}
.pin-cancel{margin-top:12px;font-size:12px;color:#aaa;cursor:pointer;border:none;background:none;text-decoration:underline}

/* GENERAL SCREEN */
#screen-general{background:linear-gradient(160deg,var(--teal-900) 0%,#0a2e2e 100%)}
.general-header{background:var(--black);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--teal-700);flex-shrink:0;position:sticky;top:0;z-index:100}
.general-body{flex:1;overflow-y:auto;padding:24px 20px 40px;max-width:1100px;margin:0 auto;width:100%}
.general-tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.gtab{padding:9px 18px;border-radius:20px;border:1.5px solid rgba(255,255,255,.2);color:var(--teal-200);background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.gtab.active{background:var(--teal-700);border-color:var(--teal-400);color:#fff}
.gtab:hover{border-color:var(--teal-400);color:#fff}
.gview{display:none}.gview.active{display:block}

/* PRESUPUESTADOR */
.presup-section{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:22px;margin-bottom:20px}
.presup-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--teal-400);margin-bottom:6px}
.presup-sub{font-size:12px;color:var(--teal-200);opacity:.7;margin-bottom:16px}
.presup-input-row{display:grid;grid-template-columns:1fr 100px 100px auto;gap:10px;align-items:end;margin-bottom:10px}
.presup-input-row input,.presup-input-row select{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.18);border-radius:8px;padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:#fff;outline:none}
.presup-input-row input::placeholder{color:rgba(255,255,255,.4)}
.presup-input-row input:focus,.presup-input-row select:focus{border-color:var(--teal-400)}
.presup-input-row select option{background:var(--teal-800);color:#fff}
.btn-add-item{background:var(--teal-700);border:none;border-radius:8px;color:#fff;font-size:18px;font-weight:700;cursor:pointer;width:38px;height:38px;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.btn-add-item:hover{background:var(--teal-600)}
.presup-items-table{width:100%;border-collapse:collapse;margin-bottom:8px;font-size:13px}
.presup-items-table th{background:rgba(255,255,255,.08);color:var(--teal-400);font-size:10px;text-transform:uppercase;letter-spacing:.1em;padding:7px 10px;text-align:left;border-bottom:1px solid rgba(255,255,255,.1)}
.presup-items-table td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.06);color:var(--teal-100)}
.presup-items-table tr:hover td{background:rgba(255,255,255,.04)}
.del-item-btn{background:none;border:none;cursor:pointer;color:#e05555;font-size:14px;padding:2px 5px}
.presup-extras{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:20px}
.extra-box{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:16px}
.extra-box label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--teal-400);display:block;margin-bottom:8px}
.extra-type-toggle{display:flex;gap:6px;margin-bottom:10px}
.etype-btn{padding:4px 12px;border-radius:14px;border:1.5px solid rgba(255,255,255,.2);background:transparent;color:var(--teal-200);font-size:12px;font-weight:600;cursor:pointer;transition:all .14s}
.etype-btn.active{background:var(--teal-700);border-color:var(--teal-400);color:#fff}
.extra-input{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.18);border-radius:8px;padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:#fff;outline:none;width:100%}
.extra-input:focus{border-color:var(--teal-400)}
.presup-totals{background:rgba(64,217,192,.07);border:1.5px solid var(--teal-600);border-radius:14px;padding:18px 22px}
.totals-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:14px;color:var(--teal-200)}
.totals-row.grand{border-top:2px solid var(--teal-600);margin-top:10px;padding-top:12px;font-family:'DM Serif Display',serif;font-size:20px;color:var(--mint)}
.totals-label{font-weight:600}
.totals-val{font-weight:700;color:#fff}
.totals-val.grand-val{font-size:22px;color:var(--mint)}
.presup-project-row{display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.presup-project-row input,.presup-project-row select{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.18);border-radius:8px;padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:#fff;outline:none;min-width:0}
.presup-project-row input::placeholder{color:rgba(255,255,255,.4)}
.presup-project-row input:focus,.presup-project-row select:focus{border-color:var(--teal-400)}
.presup-saved-list{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.presup-saved-item{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all .14s}
.presup-saved-item:hover{border-color:var(--teal-400);background:rgba(64,217,192,.07)}
.presup-saved-name{font-weight:700;color:#fff;font-size:14px}
.presup-saved-meta{font-size:11px;color:var(--teal-400);margin-top:2px}
.presup-saved-total{font-family:'DM Serif Display',serif;font-size:16px;color:var(--mint);font-weight:700}
@media(max-width:768px){
  .presup-input-row{grid-template-columns:1fr 80px;gap:8px}
  .presup-input-row .qty-input,.presup-input-row .unit-sel{display:none}
  .presup-extras{grid-template-columns:1fr}
  .general-body{padding:14px 14px 80px}
  .general-tabs{padding:0 0 4px}
}

/* PRINT */
@media print{
  body{background:#fff;color:#000}
  .app-header,.sidebar,.cal-actions,.btn-row,.nav-tabs,.month-selector,
  .activity-list,.sidebar-title,.pill-del,.del-row-btn,.edit-row-btn,
  .week-locked-badge,.week-current-badge,.week-next-badge,
  .mobile-tabbar,.mobile-month-bar,.drawer{display:none!important}
  .app-body{display:block}
  .main-area{background:#fff;overflow:visible}
  .view{display:block!important;padding:0}
  #view-calendar{display:block!important}
  #view-form,#view-registro,#view-kanban,#view-ideas{display:none!important}
  .week-block.no-activities{display:none!important}
  .cal-grid{box-shadow:none;border:1px solid #ccc;page-break-inside:avoid}
  .week-block{page-break-inside:avoid;margin-bottom:14px}
  .print-header{display:block!important}
  .cal-td.editable,.cal-td.locked{background:#fff!important}
  .cal-td.event-day{background:#e0f7f3!important}
  .cal-th,.cal-th-hour{background:#1a7a7a!important;color:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .pill{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
.print-header{display:none;font-family:'DM Serif Display',serif;font-size:20px;color:#1a7a7a;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #1a7a7a}

/* PROFILE SIDEBAR */
.profile-sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500}
.profile-sidebar-overlay.open{display:block}
.profile-sidebar{position:fixed;top:0;right:-340px;width:320px;max-width:90vw;height:100vh;background:#fff;z-index:501;display:flex;flex-direction:column;box-shadow:-8px 0 32px rgba(0,0,0,.18);transition:right .28s cubic-bezier(.4,0,.2,1);overflow-y:auto}
.profile-sidebar.open{right:0}
.profile-sidebar-header{padding:18px 18px 0;display:flex;justify-content:flex-end}
.profile-sidebar-close{background:var(--teal-100);border:none;border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--teal-700)}
.profile-sidebar-body{padding:4px 28px 36px;display:flex;flex-direction:column;align-items:center}
.profile-avatar-wrap{width:100px;height:100px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px;margin:14px auto 0;box-shadow:0 4px 20px rgba(0,0,0,.13);overflow:hidden;cursor:pointer;position:relative;flex-shrink:0;border:3px solid var(--teal-200)}
.profile-avatar-wrap img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block}
.profile-avatar-wrap:hover::after{content:"📷";position:absolute;inset:0;background:rgba(0,0,0,.45);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px}
.profile-change-photo{font-size:11px;color:#aaa;cursor:pointer;margin-top:8px;margin-bottom:18px}
.profile-change-photo:hover{color:var(--teal-600)}
.profile-name{font-family:'DM Serif Display',serif;font-size:22px;color:var(--teal-800);text-align:center;margin-bottom:4px}
.profile-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;text-align:center;margin-bottom:16px;line-height:1.5;padding:0 8px}
.profile-divider{width:100%;height:1px;background:var(--teal-100);margin-bottom:16px}
.profile-bio{font-size:13px;color:#666;line-height:1.65;text-align:center;padding:0 4px;margin-bottom:18px}
.profile-schedule{display:inline-flex;align-items:center;gap:6px;background:var(--teal-50);border:1px solid var(--teal-200);border-radius:20px;padding:6px 16px;font-size:12px;color:var(--teal-700);font-weight:600}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--teal-600);border-radius:5px}
.toast{position:fixed;bottom:26px;right:26px;background:var(--teal-700);color:#fff;padding:12px 18px;border-radius:9px;font-size:13px;font-weight:500;box-shadow:0 8px 28px rgba(0,0,0,.28);transform:translateY(70px);opacity:0;transition:all .28s ease;z-index:9999;max-width:calc(100vw - 32px)}
.toast.show{transform:translateY(0);opacity:1}

/* MOBILE */
.mobile-tabbar{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--black);border-top:2px solid var(--teal-700);z-index:200;padding:env(safe-area-inset-bottom,0) 0 0}
.mobile-tabbar-inner{display:grid;grid-template-columns:repeat(5,1fr);height:58px}
.mtab{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;background:none;border:none;color:var(--teal-400);font-family:'DM Sans',sans-serif;font-size:9px;font-weight:600;cursor:pointer;padding:5px 0;transition:color .15s,background .15s;-webkit-tap-highlight-color:transparent}
.mtab .mtab-icon{font-size:18px;line-height:1}
.mtab.active{color:#fff;background:rgba(255,255,255,.06);border-top:2px solid var(--pm)}
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300}
.drawer-overlay.open{display:block}
.drawer{position:fixed;top:0;left:-100%;bottom:0;width:min(85vw,300px);background:var(--teal-800);z-index:400;overflow-y:auto;transition:left .28s cubic-bezier(.4,0,.2,1);padding:20px 16px 24px;display:flex;flex-direction:column;gap:16px}
.drawer.open{left:0}
.drawer-close{align-self:flex-end;background:none;border:1px solid var(--teal-600);color:var(--teal-400);border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mobile-month-bar{display:none;background:var(--teal-900);border-bottom:1px solid var(--teal-700);padding:9px 14px;align-items:center;gap:8px;flex-shrink:0}
.mobile-month-bar label{font-size:11px;color:var(--teal-400);text-transform:uppercase;letter-spacing:.1em;white-space:nowrap}
.mobile-month-bar select{flex:1;background:var(--teal-900);color:#fff;border:1px solid var(--teal-600);border-radius:8px;padding:7px 9px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;-webkit-appearance:none;appearance:none}
.mobile-month-bar .drawer-btn{background:none;border:1px solid var(--teal-600);color:var(--teal-400);border-radius:8px;padding:7px 10px;font-size:14px;cursor:pointer}

@media(max-width:900px){.kanban-board{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){
  .app-header{padding:10px 14px}
  .brand-name{font-size:14px}
  .sidebar{display:none}
  .app-body{display:block}
  .main-area{padding-bottom:calc(58px + env(safe-area-inset-bottom,0px))}
  .mobile-tabbar{display:block}
  .mobile-month-bar{display:flex}
  .view{padding:0}
  .form-card{border-radius:0;padding:16px;max-width:100%;box-shadow:none}
  .idea-form{border-radius:0;margin-bottom:14px}
  .form-grid{grid-template-columns:1fr}
  .form-group.full{grid-column:1}
  .form-group input,.form-group select,.form-group textarea{font-size:16px!important;padding:12px 13px}
  .btn{padding:12px 18px;font-size:14px}
  .btn-row{flex-direction:column}
  .btn-row .btn{width:100%;text-align:center}
  #view-calendar{padding:0}
  .cal-header{padding:12px 14px 0;margin-bottom:12px}
  .cal-title{font-size:19px}
  #calendar-body{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:10px 0 14px}
  .week-block{margin-bottom:18px;padding:0 10px}
  .cal-grid{min-width:520px}
  .cal-td{height:38px}
  #view-registro{padding:0}
  .registro-header{padding:12px 14px;margin-bottom:10px}
  .reg-table-wrap{padding:0 10px 12px}
  .kanban-board{grid-template-columns:1fr 1fr;padding:0 14px 14px}
  .kanban-header{padding:12px 14px 0}
  #view-kanban{padding:0}
  #view-ideas{padding:0}
  .ideas-header{padding:12px 14px 0}
  .ideas-grid{padding:0 14px 14px}
  .toast{bottom:calc(68px + env(safe-area-inset-bottom,0px));right:14px;left:14px;text-align:center}
  .modal{border-radius:12px;padding:20px}
}
/* EVENTOS CALENDAR */
.ev-layout{display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:start}
.ev-cal-wrap{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:20px}
.ev-cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.ev-cal-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--teal-400)}
.ev-cal-nav-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:var(--teal-200);width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.ev-cal-nav-btn:hover{background:rgba(255,255,255,.15)}
.ev-month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.ev-day-header{text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--teal-600);padding:4px 0}
.ev-day{min-height:36px;border-radius:8px;display:flex;flex-direction:column;align-items:center;padding:4px 2px;cursor:pointer;transition:background .12s;position:relative}
.ev-day:hover{background:rgba(64,217,192,.12)}
.ev-day.other-month{opacity:.3;cursor:default}
.ev-day.today .ev-day-num{background:var(--teal-600);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.ev-day.has-event::after{content:'';width:5px;height:5px;border-radius:50%;background:var(--mint);margin-top:2px}
.ev-day-num{font-size:12px;font-weight:600;color:var(--teal-200);line-height:1;padding:3px}
.ev-day.selected{background:rgba(64,217,192,.18);outline:1.5px solid var(--teal-400)}
/* Upcoming events panel */
.ev-panel{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:14px;max-height:calc(100vh - 200px);overflow-y:auto}
.ev-panel-title{font-family:'DM Serif Display',serif;font-size:17px;color:var(--teal-400);margin-bottom:4px}
.ev-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px;cursor:pointer;transition:all .14s;position:relative}
.ev-card:hover{border-color:var(--teal-400);background:rgba(64,217,192,.07)}
.ev-card-date{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--teal-600);margin-bottom:4px}
.ev-card-name{font-weight:700;font-size:14px;color:#fff;margin-bottom:3px}
.ev-card-tipo{font-size:11px;color:var(--teal-400);margin-bottom:6px}
.ev-card-cliente{font-size:11px;color:var(--teal-200)}
.ev-status-badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:10px;font-weight:700;margin-top:6px}
.evs-primer-contacto{background:#e3f2fd;color:#1565c0}
.evs-propuesta-enviada{background:#fff8e1;color:#f57f17}
.evs-propuesta-revisada{background:#fce4ec;color:#c62828}
.evs-cotizacion-aprobada{background:#e8f5e9;color:#2e7d32}
.evs-produccion{background:#f3e5f5;color:#6a1b9a}
.evs-listo-entregar{background:#e0f7fa;color:#00695c}
.evs-evento-finalizado{background:#d1c4e9;color:#311b92}
.evs-sin-respuesta{background:#eceff1;color:#546e7a}
.ev-del-btn{position:absolute;top:10px;right:10px;background:none;border:none;cursor:pointer;color:rgba(255,255,255,.25);font-size:13px}
.ev-del-btn:hover{color:#e05555}
/* Event form modal */
.ev-form-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:2000;align-items:center;justify-content:center;padding:16px}
.ev-form-overlay.open{display:flex}
.ev-form-box{background:#0f3535;border:1px solid var(--teal-700);border-radius:20px;padding:28px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;position:relative}
.ev-form-box h2{font-family:'DM Serif Display',serif;font-size:20px;color:var(--teal-400);margin-bottom:20px}
.ev-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ev-form-group{display:flex;flex-direction:column;gap:4px}
.ev-form-group.full{grid-column:1/-1}
.ev-form-group label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--teal-600)}
.ev-form-group input,.ev-form-group select,.ev-form-group textarea{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.15);border-radius:8px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:#fff;outline:none}
.ev-form-group input:focus,.ev-form-group select:focus,.ev-form-group textarea:focus{border-color:var(--teal-400)}
.ev-form-group select option{background:#0f3535;color:#fff}
.ev-form-group textarea{resize:vertical;min-height:60px}
.ev-form-group input::placeholder,.ev-form-group textarea::placeholder{color:rgba(255,255,255,.3)}
/* Event detail / elementos */
.ev-detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:2000;align-items:center;justify-content:center;padding:16px}
.ev-detail-overlay.open{display:flex}
.ev-detail-box{background:#0f3535;border:1px solid var(--teal-700);border-radius:20px;padding:0;width:100%;max-width:680px;max-height:92vh;overflow-y:auto;position:relative;display:flex;flex-direction:column}
.ev-detail-header{padding:22px 28px 16px;border-bottom:1px solid rgba(255,255,255,.1);position:sticky;top:0;background:#0f3535;z-index:10}
.ev-detail-body{padding:20px 28px 28px;flex:1}
.ev-det-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.ev-det-chip{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--teal-200)}
.ev-elementos-section{margin-top:20px}
.ev-elementos-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--teal-600);margin-bottom:12px}
.ev-elem-add-row{display:grid;grid-template-columns:1fr 160px auto;gap:8px;margin-bottom:12px;align-items:end}
.ev-elem-add-row input,.ev-elem-add-row select{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.15);border-radius:8px;padding:9px 11px;font-family:'DM Sans',sans-serif;font-size:13px;color:#fff;outline:none}
.ev-elem-add-row input::placeholder{color:rgba(255,255,255,.3)}
.ev-elem-add-row select option{background:#0f3535;color:#fff}
.ev-elem-add-row input:focus,.ev-elem-add-row select:focus{border-color:var(--teal-400)}
.ev-elem-list{display:flex;flex-direction:column;gap:8px}
.ev-elem-item{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.ev-elem-cat{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:2px 8px;border-radius:10px}
.cat-decoracion{background:#fce4ec;color:#c62828}
.cat-centro{background:#e3f2fd;color:#1565c0}
.cat-mobiliario{background:#fff8e1;color:#e65100}
.cat-servicio{background:#e8f5e9;color:#2e7d32}
.ev-elem-name{font-size:13px;font-weight:600;color:#fff;flex:1}
.ev-status-select{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.15);border-radius:8px;padding:7px 10px;font-family:'DM Sans',sans-serif;font-size:12px;color:#fff;outline:none;cursor:pointer}
.ev-status-select option{background:#0f3535}
@media(max-width:900px){.ev-layout{grid-template-columns:1fr}}
@media(max-width:600px){
  .ev-form-grid{grid-template-columns:1fr}
  .ev-form-group.full{grid-column:1}
  .ev-elem-add-row{grid-template-columns:1fr auto;gap:6px}
  .ev-elem-add-row select{display:none}
}

</head>

</div>

<!-- GENERAL SCREEN -->
<div id="screen-general" class="screen">
  <header class="general-header">

// ── WEEK UTILS ──
// Parse a YYYY-MM-DD string as a LOCAL midnight date (avoid UTC shift bugs)
function parseLocalDate(dateStr){
  const [y,m,d]=dateStr.split("-").map(Number);
  const dt=new Date(y,m-1,d);dt.setHours(0,0,0,0);return dt;
}
function weekMonday(d){
  const dt=new Date(d);dt.setHours(0,0,0,0);
  const dow=dt.getDay(); // 0=Sun,1=Mon,...,6=Sat
  const diff=(dow===0)?-6:(1-dow); // shift so Monday=0
  dt.setDate(dt.getDate()+diff);
  return dt;
}
function getAllowedWeeks(){
  const today=new Date();today.setHours(0,0,0,0);
  const curMon=weekMonday(today);
  const nextMon=new Date(curMon);nextMon.setDate(nextMon.getDate()+7);
  return{curMon,nextMon};
}
function isEditableDate(dateStr){
  const d=parseLocalDate(dateStr);
  const mon=weekMonday(d);
  const{curMon,nextMon}=getAllowedWeeks();
  return mon.getTime()===curMon.getTime()||mon.getTime()===nextMon.getTime();
}

// ── CALENDAR ──
// Returns hour index in HOURS array, or -1
function hIdx(h){return HOURS.indexOf(h);}

function renderCalendar() {

  document.getElementById("print-title").textContent=`Calendario · ${currentPerson.person} · ${monthName} ${year}`;

  const body=document.getElementById("calendar-body");
  body.innerHTML="";
  const {curMon,nextMon}=getAllowedWeeks();

  // Solo renderizar semana actual y siguiente
  const weeksToRender=[{wMon:new Date(curMon),isCurrent:true,isNext:false},{wMon:new Date(nextMon),isCurrent:false,isNext:true}];
  let weekNum=0;

  weeksToRender.forEach(({wMon,isCurrent,isNext})=>{
    weekNum++;
    const weekEnd=new Date(wMon);weekEnd.setDate(weekEnd.getDate()+6);
    const weekDates=Array.from({length:7},(_,i)=>{const d=new Date(wMon);d.setDate(d.getDate()+i);return d;});
    const isLocked=false; // ambas semanas son editables
    const weekDateStrs=weekDates.map(toDateStr);

    const weekBlock=document.createElement("div");
    weekBlock.className="week-block";
    if(isCurrent) weekBlock.id="current-week-block";

    const wLabel=document.createElement("div");wLabel.className="week-label";
    let badge=isCurrent?`<span class="week-current-badge">✏️ Semana actual</span>`:`<span class="week-next-badge">➡️ Próxima semana</span>`;
    wLabel.innerHTML=`Semana ${weekNum} · ${fmtDate(wMon)} – ${fmtDate(weekEnd)} ${badge}`;
    weekBlock.appendChild(wLabel);

    // Build grid using TABLE for strict column control
    const table=document.createElement("table");
    table.className="cal-table";
    table.innerHTML=`<colgroup><col style="width:58px">${weekDates.map(()=>'<col>').join("")}</colgroup>`;
    const thead=document.createElement("thead"),tbody=document.createElement("tbody");
    table.appendChild(thead);table.appendChild(tbody);

    // ── Header row ──
    const hRow=document.createElement("tr");
    const thHour=document.createElement("th");thHour.className="cal-th cal-th-hour";thHour.textContent="HORA";hRow.appendChild(thHour);
    weekDates.forEach((d,i)=>{
      const isWeekend=i>=5; // Sábado(5) y Domingo(6)
      const inMonth=d.getMonth()+1===month;
      const th=document.createElement("th");th.className="cal-th"+(isWeekend?" event-day":"");
      th.innerHTML=`${DAYS_FULL[i]}<span class="day-date">${inMonth?d.getDate():"·"}</span>${isWeekend?'<br><span style="font-size:8px;opacity:.6">🎪</span>':""}`;
      hRow.appendChild(th);
    });
    thead.appendChild(hRow);

    // ── Build span map ──
    // spanMap[dateStr][hourStr] = [{act, span}, ...] — array para soportar múltiples spans
    // occupied[dateStr][hourStr] = [actId, ...] — ids que ya ocupan esa fila
    const spanMap={}, occupied={};

    // Primero: actividades con rango de horas (start -> end)
    activities.filter(a=>weekDateStrs.includes(a.date)&&a.start!=="todo-el-dia"&&a.end&&a.end!=="").forEach(act=>{
      const si=hIdx(act.start),ei=hIdx(act.end);
      if(si<0||ei<=si)return;
      const span=ei-si;
      if(!spanMap[act.date])spanMap[act.date]={};
      if(!spanMap[act.date][act.start])spanMap[act.date][act.start]=[];
      spanMap[act.date][act.start].push({act,span});
      for(let k=1;k<span;k++){
        const h=HOURS[si+k];if(!h)break;
        if(!occupied[act.date])occupied[act.date]={};
        if(!occupied[act.date][h])occupied[act.date][h]=[];
        occupied[act.date][h].push(act.id);
      }
    });

    // Segundo: actividades "todo el dia" — span desde day_start hasta day_end del colaborador
    const dayStartH=currentPerson.day_start||HOURS[0];
    const dayEndH=currentPerson.day_end||HOURS[HOURS.length-1];
    const dsi=hIdx(dayStartH),dei=hIdx(dayEndH);
    const alldaySpan=(dsi>=0&&dei>dsi)?dei-dsi:HOURS.length;
    const alldayStartH=dsi>=0?dayStartH:HOURS[0];

    activities.filter(a=>weekDateStrs.includes(a.date)&&a.start==="todo-el-dia").forEach(act=>{
      const fakeAct={...act,start:alldayStartH,end:dayEndH};
      if(!spanMap[fakeAct.date])spanMap[fakeAct.date]={};
      if(!spanMap[fakeAct.date][alldayStartH])spanMap[fakeAct.date][alldayStartH]=[];
      spanMap[fakeAct.date][alldayStartH].push({act:fakeAct,span:alldaySpan,isAllday:true});
      for(let k=1;k<alldaySpan;k++){
        const h=HOURS[dsi+k];if(!h)break;
        if(!occupied[fakeAct.date])occupied[fakeAct.date]={};
        if(!occupied[fakeAct.date][h])occupied[fakeAct.date][h]=[];
        occupied[fakeAct.date][h].push(act.id);
      }
    });

    // ── Assign colors a todas las actividades de la semana ──
    const colorMap={};
    let colorIdx=0;
    activities.filter(a=>weekDateStrs.includes(a.date)).forEach(act=>{
      if(colorMap[act.id]===undefined){ colorMap[act.id]=colorIdx%PILL_COLORS.length; colorIdx++; }
    });

    // ── Hour rows ──
    // activeRowSpans[colIndex] = remaining rows to skip (because a rowspan cell above is covering this cell)
    const activeRowSpans = weekDates.map(()=>0);

    HOURS.forEach((h,hi)=>{
      const tr=document.createElement("tr");
      const tdHour=document.createElement("td");tdHour.className="cal-cell hour-label";tdHour.textContent=HOUR_LABELS[hi];
      tdHour.style.cssText="background:var(--teal-800);color:var(--teal-400);font-weight:700;font-size:10px;text-align:center;border-right:2px solid var(--teal-600);border-bottom:1px solid var(--teal-100);height:46px;vertical-align:middle;padding:2px";
      tr.appendChild(tdHour);

      weekDates.forEach((d,di)=>{
        // If a rowspan from a previous row is still covering this cell, skip it
        if(activeRowSpans[di]>0){ activeRowSpans[di]--; return; }

        const isWorkday=di<5; // Mon-Fri are work days (index 0-4); Sat=5, Sun=6
        const isWeekend=di>=5;
        const inMonth=d.getMonth()+1===month;
        const td=document.createElement("td");
        const dateStr=toDateStr(d);

        if(isWeekend){
          // Sáb/Dom = día de eventos, no editable
          td.className="cal-td event-day";
          if(hi===0)td.innerHTML=`<span style="font-size:8px;font-weight:700;color:var(--teal-700);opacity:.65">🎪 ${di===5?"Sábado":"Domingo"}</span>`;
        } else if(!inMonth){
          td.className="cal-td out-month";
        } else if(isLocked){
          td.className="cal-td locked";
          if(hi===0){const ov=document.createElement("div");ov.style.cssText="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none";ov.innerHTML=`<span style="font-size:10px;color:#bbb">🔒</span>`;td.appendChild(ov);}
        } else {
          td.className="cal-td editable";
          td.style.background=hi%2===0?"var(--teal-50)":"var(--white)";
          td.addEventListener("dragover",e=>{e.preventDefault();td.classList.add("drag-over");});
          td.addEventListener("dragleave",()=>td.classList.remove("drag-over"));
          td.addEventListener("drop",e=>{
            e.preventDefault();td.classList.remove("drag-over");
            const id=parseInt(e.dataTransfer.getData("text/plain"));
            const act=activities.find(a=>a.id===id);
            if(act&&isEditableDate(dateStr)){act.date=dateStr;act.start=h;save();renderCalendar();renderRegistro();showToast("📅 Actividad movida");}
          });
          td.addEventListener("touchend",e=>{
            if(window._draggingId!==undefined){
              const act=activities.find(a=>a.id===window._draggingId);
              if(act&&isEditableDate(dateStr)){act.date=dateStr;act.start=h;save();renderCalendar();renderRegistro();showToast("📅 Actividad movida");}
              window._draggingId=undefined;
            }
          });
        }

        // ── Render pills ──
        const spanActIds=spanMap[dateStr]&&spanMap[dateStr][h]?spanMap[dateStr][h].map(e=>e.act.id):[];
        const cellActs=activities.filter(a=>a.date===dateStr&&a.start===h&&a.start!=="todo-el-dia"&&!spanActIds.includes(a.id));

        if(spanMap[dateStr]&&spanMap[dateStr][h]&&spanMap[dateStr][h].length>0){
          const spans=spanMap[dateStr][h];
          const mainSpan=spans[0];
          td.rowSpan=mainSpan.span;
          // Register how many rows this span will cover for the columns tracker
          activeRowSpans[di]=mainSpan.span-1;
          td.style.verticalAlign="top";
          td.style.position="relative";
          td.style.height="auto";
          td.style.overflow="visible";
          td.style.display="flex";
          td.style.flexDirection="column";
          td.style.gap="2px";
          td.style.padding="3px";

          spans.forEach(({act:sAct,span:sSpan,isAllday})=>{
            const pill=document.createElement("div");
            pill.className="pill-span";
            const [bg,fg]=colorMap[sAct.id]!==undefined?PILL_COLORS[colorMap[sAct.id]]:[currentPerson.person_main,"#fff"];
            const label=isAllday?`${sAct.name}<br><span style="font-size:8px;opacity:.75">☀️ Todo el día</span>`:sAct.name;
            const timeLabel=isAllday?`${currentPerson.day_start} – ${currentPerson.day_end}`:`${sAct.start} – ${sAct.end}`;
            pill.style.cssText=`background:${bg};color:${fg};position:relative;flex:1;min-height:0`;
            pill.innerHTML=`<span style="font-weight:700;font-size:10px;overflow:hidden;display:block">${label}</span><span class="pill-span-time">${timeLabel}</span>${!isLocked?`<button class="pill-del" onclick="deleteActivity(${sAct.id},event)" style="position:absolute;top:3px;right:3px">×</button>`:""}`;
            pill.title=sAct.desc||sAct.name;
            pill.draggable=!isLocked;
            pill.addEventListener("dragstart",e=>{e.dataTransfer.setData("text/plain",""+sAct.id);pill.style.opacity="0.5";});
            pill.addEventListener("dragend",()=>pill.style.opacity="");
            pill.addEventListener("touchstart",()=>{window._draggingId=sAct.id;},{passive:true});
            pill.addEventListener("click",e=>{if(e.target.classList.contains("pill-del"))return;openDetailModal(sAct.id);});
            td.appendChild(pill);
          });
          cellActs.forEach(act=>addNormalPill(td,act,0,isLocked,colorMap));
        } else {
          cellActs.forEach((act)=>addNormalPill(td,act,0,isLocked,colorMap));
        }

        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });

    const gridDiv=document.createElement("div");gridDiv.className="cal-grid";
    gridDiv.appendChild(table);
    weekBlock.appendChild(gridDiv);
    body.appendChild(weekBlock);
  });

  // Semana actual siempre es la primera — scroll al inicio
  setTimeout(()=>{
    const ma=document.querySelector(".main-area");
    if(ma) ma.scrollTop=0;
  },60);
}

function addNormalPill(td,act,slotIdx,isLocked,colorMap){
  const pill=document.createElement("div");
  pill.className="pill";
  const ci=colorMap[act.id]!==undefined?colorMap[act.id]:(act.id%PILL_COLORS.length);
  const [bg,fg]=PILL_COLORS[ci];
  pill.style.cssText=`background:${bg};color:${fg}`;
  pill.textContent=act.name;
  pill.title=act.desc||act.name;
  pill.draggable=!isLocked;
  if(!isLocked){
    const del=document.createElement("button");del.className="pill-del";del.textContent="×";
    del.onclick=e=>deleteActivity(act.id,e);pill.appendChild(del);
  }
  pill.addEventListener("dragstart",e=>{e.dataTransfer.setData("text/plain",""+act.id);pill.style.opacity="0.5";});
  pill.addEventListener("dragend",()=>pill.style.opacity="");
  pill.addEventListener("touchstart",()=>{window._draggingId=act.id;},{passive:true});
  pill.addEventListener("click",e=>{if(e.target.classList.contains("pill-del"))return;openDetailModal(act.id);});
  td.appendChild(pill);
  // Allow cell to grow if multiple pills
  if(td.children.length>1) td.style.height="auto";
}

function openDetailModal(id){

    <div class="modal-info-row"><span>Estado</span><span class="status-badge sb-${act.status||'pendiente'}">${sL[act.status||"pendiente"]}</span></div>
    ${locked?'<div style="margin-top:10px;font-size:12px;color:#aaa">🔒 Semana bloqueada</div>':""}`;

  if(!locked){

function closeModal(e){if(!e||e.target===document.getElementById("modal-overlay"))closeModalDirect();}
function closeModalDirect(){document.getElementById("modal-overlay").classList.remove("open");}

function editActivity(id){
  const act=activities.find(a=>a.id===id);if(!act)return;
  if(!isEditableDate(act.date)){showToast("🔒 Semana bloqueada.","#c0392b");return;}
  editingId=id;
  document.getElementById("form-title-label").textContent="Editar Actividad";
  document.getElementById("form-save-btn").textContent="💾 Guardar Cambios";
  document.getElementById("f-name").value=act.name;
  document.getElementById("f-desc").value=act.desc||"";
  document.getElementById("f-date").value=act.date;
  document.getElementById("f-start").value=act.start;
  document.getElementById("f-end").value=act.end||"";
  // Show/hide end group based on start value
  const egE=document.getElementById("f-end-group");
  if(egE) egE.style.display="";
  setStatusUI(act.status);
  closeModal();showView("form");window.scrollTo(0,0);
}

let _generalKanbanUnsubs = [];
let _generalIdeas = [];
let _generalIdeasUnsub = null;

function showGView(v) {

function startGeneralSubscriptions() {
  if (!window._fbSubscribe) return;
  stopGeneralSubscriptions();
  // Subscribe all persons for kanban
  PERSONS_DATA.forEach(p => {
    const unsub = window._fbSubscribe(p.storage_key, data => {
      _generalKanbanActs[p.key] = (data ? (data.activities || []) : []).map(a => ({...a, _personKey: p.key}));
      renderGeneralKanban();
    });
    _generalKanbanUnsubs.push(unsub);
  });
  // Subscribe shared ideas
  _generalIdeasUnsub = window._fbSubscribeShared ? window._fbSubscribeShared("valkibah_general_ideas", data => {
    _generalIdeas = data ? (data.ideas || []) : [];
    renderGeneralIdeas();
  }) : null;
  // Subscribe eventos
  startEventosSubscription();
  // Init calendar display
  _evCalYear = new Date().getFullYear(); _evCalMonth = new Date().getMonth();
  setTimeout(()=>{ renderEvCal(); renderEvUpcoming(); }, 200);
}
function stopGeneralSubscriptions() {
  _generalKanbanUnsubs.forEach(u => u());
  _generalKanbanUnsubs = [];
  if (_generalIdeasUnsub) { _generalIdeasUnsub(); _generalIdeasUnsub = null; }
  if (_evUnsub) { _evUnsub(); _evUnsub = null; }
}

  const cols = ["pendiente","en-progreso","completada","bloqueada"];
  let allActs = Object.values(_generalKanbanActs).flat();

    col.innerHTML = "";
    const filtered = allActs.filter(a => (a.status || "pendiente") === s);
    count.textContent = filtered.length;

  });
}

let presupItems = [];
let presupSaved = [];
let presupCurrentId = null;
let mdoType = "pct";
let ganType = "pct";

function setExtraType(which, type, btn) {
  if (which === "mdo") {
    mdoType = type;
    document.getElementById("mdo-pct-btn").classList.toggle("active", type==="pct");
    document.getElementById("mdo-fixed-btn").classList.toggle("active", type==="fixed");
  } else {
    ganType = type;
    document.getElementById("gan-pct-btn").classList.toggle("active", type==="pct");
    document.getElementById("gan-fixed-btn").classList.toggle("active", type==="fixed");
  }
  updateTotals();
}

function addPresupItem() {
  const nameEl = document.getElementById("item-name");
  const qtyEl = document.getElementById("item-qty") || document.getElementById("item-qty-m");
  const priceEl = document.getElementById("item-price");
  const name = nameEl.value.trim();
  const qty = parseFloat(document.getElementById("item-qty").value) || parseFloat(document.getElementById("item-qty-m")?.value) || 1;
  const price = parseFloat(priceEl.value) || 0;
  if (!name) { showToast("⚠️ Escribe el nombre del artículo"); return; }
  presupItems.push({ id: Date.now(), name, qty, price });
  nameEl.value = ""; document.getElementById("item-price").value = "";
  document.getElementById("item-qty").value = 1;
  if (document.getElementById("item-qty-m")) document.getElementById("item-qty-m").value = 1;
  renderPresupItems();
  updateTotals();
}

function deletePresupItem(id) {
  presupItems = presupItems.filter(i => i.id !== id);
  renderPresupItems(); updateTotals();
}

function renderPresupItems() {
  const tbody = document.getElementById("presup-items-body");
  const empty = document.getElementById("presup-items-empty");
  const wrap = document.getElementById("presup-items-wrap");
  if (!tbody) return;
  tbody.innerHTML = "";
  if (presupItems.length === 0) { wrap.style.display="none"; empty.style.display="block"; return; }
  wrap.style.display=""; empty.style.display="none";
  presupItems.forEach(item => {
    const sub = (item.qty * item.price).toFixed(2);
    const tr = document.createElement("tr");
    tr.innerHTML = `<td style="font-weight:600">${item.name}</td><td style="text-align:center">${item.qty}</td><td>$${item.price.toFixed(2)}</td><td style="font-weight:700;color:var(--teal-700)">$${sub}</td><td><button class="del-item-btn" onclick="deletePresupItem(${item.id})">🗑</button></td>`;
    tbody.appendChild(tr);
  });
}

function updateTotals() {
  const matTotal = presupItems.reduce((sum, i) => sum + i.qty * i.price, 0);
  const horas = parseFloat(document.getElementById("tiempo-horas")?.value) || 0;
  const costoHr = parseFloat(document.getElementById("costo-hora")?.value) || 0;
  const tiempoAmt = horas * costoHr;
  const mdoVal = parseFloat(document.getElementById("mdo-val")?.value) || 0;
  const ganVal = parseFloat(document.getElementById("gan-val")?.value) || 0;
  const mdoAmt = mdoType === "pct" ? matTotal * mdoVal / 100 : mdoVal;
  const ganBase = matTotal + tiempoAmt + mdoAmt;
  const ganAmt = ganType === "pct" ? ganBase * ganVal / 100 : ganVal;
  const final = matTotal + tiempoAmt + mdoAmt + ganAmt;
  const fmt = n => "$" + n.toFixed(2);
  if(document.getElementById("subtotal-mats")) document.getElementById("subtotal-mats").textContent=fmt(matTotal);
  if(document.getElementById("tot-mats")) document.getElementById("tot-mats").textContent=fmt(matTotal);
  if(document.getElementById("tot-tiempo")) document.getElementById("tot-tiempo").textContent=fmt(tiempoAmt);
  if(document.getElementById("tot-mdo")) document.getElementById("tot-mdo").textContent=fmt(mdoAmt);
  if(document.getElementById("tot-gan")) document.getElementById("tot-gan").textContent=fmt(ganAmt);
  if(document.getElementById("tot-final")) document.getElementById("tot-final").textContent=fmt(final);
  if(document.getElementById("mdo-preview")) document.getElementById("mdo-preview").textContent=`= ${fmt(mdoAmt)}`;
  if(document.getElementById("gan-preview")) document.getElementById("gan-preview").textContent=`= ${fmt(ganAmt)}`;
  if(document.getElementById("tiempo-preview")) document.getElementById("tiempo-preview").textContent=`= ${fmt(tiempoAmt)} en mano de obra`;
  return { matTotal, tiempoAmt, mdoAmt, ganAmt, final };
}

async function savePresup() {
  const name = document.getElementById("presup-name").value.trim();
  if (!name) { showToast("⚠️ Ponle un nombre al proyecto"); return; }
  const totals = updateTotals();
  const record = {
    id: presupCurrentId || Date.now(),
    name,
    items: JSON.parse(JSON.stringify(presupItems)),
    mdoType, ganType,
    mdoVal: parseFloat(document.getElementById("mdo-val").value)||0,
    ganVal: parseFloat(document.getElementById("gan-val").value)||0,
    tiempoHoras: parseFloat(document.getElementById("tiempo-horas").value)||0,
    costoHora: parseFloat(document.getElementById("costo-hora").value)||0,
    ...totals,
    date: new Date().toISOString().slice(0,10)
  };
  presupCurrentId = record.id;
  const idx = presupSaved.findIndex(p => p.id === record.id);
  if (idx >= 0) presupSaved[idx] = record; else presupSaved.push(record);
  if (window._fbSaveShared) await window._fbSaveShared("valkibah_presupuestos", { presupuestos: presupSaved });
  renderPresupSaved();
  showToast("💾 Presupuesto guardado");
}

function loadPresup(id) {
  const rec = presupSaved.find(p => p.id === id);
  if (!rec) return;
  presupCurrentId = rec.id;
  document.getElementById("presup-name").value = rec.name;
  presupItems = JSON.parse(JSON.stringify(rec.items));
  mdoType = rec.mdoType || "pct";
  ganType = rec.ganType || "pct";
  document.getElementById("mdo-val").value = rec.mdoVal || 0;
  document.getElementById("gan-val").value = rec.ganVal || 0;
  document.getElementById("tiempo-horas").value = rec.tiempoHoras || 0;
  document.getElementById("costo-hora").value = rec.costoHora || 0;
  setExtraType("mdo", mdoType, null);
  setExtraType("gan", ganType, null);
  renderPresupItems(); updateTotals();
  showGView("presup");
  showToast("📂 Presupuesto cargado");
}

function deletePresupSaved(id, e) {
  e.stopPropagation();
  presupSaved = presupSaved.filter(p => p.id !== id);
  if (window._fbSaveShared) window._fbSaveShared("valkibah_presupuestos", { presupuestos: presupSaved });
  if (presupCurrentId === id) newPresup();
  renderPresupSaved();
  showToast("🗑 Presupuesto eliminado");
}

function newPresup() {
  presupCurrentId = null;
  presupItems = [];
  document.getElementById("presup-name").value = "";
  document.getElementById("mdo-val").value = "";
  document.getElementById("gan-val").value = "";
  document.getElementById("tiempo-horas").value = "";
  document.getElementById("costo-hora").value = "";
  mdoType="pct"; ganType="pct";
  setExtraType("mdo","pct",null); setExtraType("gan","pct",null);
  renderPresupItems(); updateTotals();
}

function renderPresupSaved() {
  const list = document.getElementById("presup-saved-list");
  if (!list) return;
  list.innerHTML = "";
  if (presupSaved.length === 0) return;
  presupSaved.slice().reverse().forEach(rec => {
    const div = document.createElement("div");
    div.className = "presup-saved-item";
    div.onclick = () => loadPresup(rec.id);
    div.innerHTML = `
      <div>
        <div class="presup-saved-name">${rec.name}</div>
        <div class="presup-saved-meta">📅 ${formatDisplayDate(rec.date)} · ${rec.items.length} artículo(s)</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="presup-saved-total">$${rec.final.toFixed(2)}</span>
        <button onclick="deletePresupSaved(${rec.id},event)" style="background:none;border:none;cursor:pointer;color:#e05555;font-size:14px">🗑</button>

}

function initPresupSubscription() {
  if (!window._fbSubscribeShared) return;
  window._fbSubscribeShared("valkibah_presupuestos", data => {
    presupSaved = data ? (data.presupuestos || []) : [];
    renderPresupSaved();
  });
}

const EV_STATUS_LABELS = {

// ── CALENDAR RENDER ──
function evCalNav(dir) {
  _evCalMonth += dir;
  if (_evCalMonth > 11) { _evCalMonth = 0; _evCalYear++; }
  if (_evCalMonth < 0)  { _evCalMonth = 11; _evCalYear--; }
  renderEvCal();
}

function renderEvCal() {
  const title = document.getElementById('ev-cal-title');
  const grid  = document.getElementById('ev-month-grid');
  if (!title || !grid) return;
  const mNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  title.textContent = `${mNames[_evCalMonth]} ${_evCalYear}`;
  grid.innerHTML = '';
  // Day headers Mon-Sun
  ['Lu','Ma','Mi','Ju','Vi','Sá','Do'].forEach(d => {
    const h = document.createElement('div'); h.className = 'ev-day-header'; h.textContent = d; grid.appendChild(h);
  });
  const firstDay = new Date(_evCalYear, _evCalMonth, 1);
  const lastDay  = new Date(_evCalYear, _evCalMonth+1, 0);
  const today    = new Date(); today.setHours(0,0,0,0);
  // Day of week of first: 0=Sun → need Mon-first offset
  let startOffset = firstDay.getDay() - 1; if (startOffset < 0) startOffset = 6;
  // Fill blanks from prev month
  for (let i = 0; i < startOffset; i++) {
    const blank = document.createElement('div'); blank.className = 'ev-day other-month';
    const pd = new Date(_evCalYear, _evCalMonth, -startOffset + 1 + i);
    blank.innerHTML = `<span class="ev-day-num">${pd.getDate()}</span>`; grid.appendChild(blank);
  }
  // Days
  const evDates = new Set(_eventos.map(e => e.fecha));
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const dt  = new Date(_evCalYear, _evCalMonth, d);
    const dStr = toDateStr(dt);
    const cell = document.createElement('div');
    cell.className = 'ev-day' + (dt.getTime() === today.getTime() ? ' today' : '') + (evDates.has(dStr) ? ' has-event' : '') + (_evSelectedDate === dStr ? ' selected' : '');
    cell.innerHTML = `<span class="ev-day-num">${d}</span>`;
    cell.onclick = () => { _evSelectedDate = dStr; renderEvCal(); renderEvDayEvents(dStr); };
    grid.appendChild(cell);
  }
  // Fill remaining
  const total = startOffset + lastDay.getDate();
  const remainder = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= remainder; i++) {
    const blank = document.createElement('div'); blank.className = 'ev-day other-month';
    blank.innerHTML = `<span class="ev-day-num">${i}</span>`; grid.appendChild(blank);
  }
}

function renderEvDayEvents(dateStr) {
  const container = document.getElementById('ev-day-events'); if (!container) return;
  const dayEvs = _eventos.filter(e => e.fecha === dateStr);
  if (dayEvs.length === 0) { container.innerHTML = ''; return; }
  const [y,m,d] = dateStr.split('-'); const dateLabel = `${d}/${m}/${y}`;
  container.innerHTML = `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--teal-600);margin-bottom:8px">Eventos · ${dateLabel}</div>`;
  dayEvs.forEach(ev => container.appendChild(buildEvCard(ev)));
}

function renderEvUpcoming() {
  const list = document.getElementById('ev-upcoming-list'); if (!list) return;
  const today = toDateStr(new Date());
  const upcoming = _eventos.filter(e => e.fecha >= today && e.estatus !== 'evento-finalizado')
    .sort((a,b) => a.fecha.localeCompare(b.fecha));
  const finished = _eventos.filter(e => e.estatus === 'evento-finalizado' || e.fecha < today)
    .sort((a,b) => b.fecha.localeCompare(a.fecha)).slice(0,5);
  if (_eventos.length === 0) { list.innerHTML = '<div style="color:rgba(255,255,255,.3);font-size:13px;text-align:center;padding:20px 0">Sin eventos registrados</div>'; return; }
  list.innerHTML = '';
  if (upcoming.length > 0) {
    const label = document.createElement('div'); label.style.cssText='font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--teal-600);margin-bottom:8px'; label.textContent='Próximos'; list.appendChild(label);
    upcoming.forEach(ev => list.appendChild(buildEvCard(ev)));
  }
  if (finished.length > 0) {
    const label = document.createElement('div'); label.style.cssText='font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--teal-600);margin:14px 0 8px'; label.textContent='Recientes / Finalizados'; list.appendChild(label);
    finished.forEach(ev => list.appendChild(buildEvCard(ev)));
  }
}

function buildEvCard(ev) {
  const card = document.createElement('div'); card.className = 'ev-card';
  const [y,m,d] = ev.fecha.split('-');
  const statusLabel = EV_STATUS_LABELS[ev.estatus] || ev.estatus;
  const statusClass = 'evs-' + ev.estatus;
  card.innerHTML = `
    <button class="ev-del-btn" onclick="deleteEvento(${ev.id},event)">✕</button>
    <div class="ev-card-date">📅 ${d}/${m}/${y}</div>
    <div class="ev-card-name">${ev.nombre}</div>
    <div class="ev-card-tipo">${ev.tipo}</div>
    <div class="ev-card-cliente">👤 ${ev.cliente}</div>
    <span class="ev-status-badge ${statusClass}">${statusLabel}</span>`;
  card.onclick = e => { if (e.target.classList.contains('ev-del-btn')) return; openEvDetail(ev.id); };
  return card;
}

function closeEvDetail() { document.getElementById('ev-detail-overlay').classList.remove('open'); _evDetailId = null; window._evDetailId = null; }

function renderEvDetail(id) {
  const ev = _eventos.find(e => e.id === id); if (!ev) return;
  document.getElementById('evd-nombre').textContent  = ev.nombre;
  document.getElementById('evd-cliente').textContent = `👤 ${ev.cliente}`;
  document.getElementById('evd-status-sel').value    = ev.estatus || 'primer-contacto';
  document.getElementById('evd-obs').textContent     = ev.obs ? `💬 ${ev.obs}` : '';
  // Meta chips
  const [y,m,d] = ev.fecha.split('-');
  const meta = document.getElementById('evd-meta'); meta.innerHTML = '';
  [`📅 ${d}/${m}/${y}`, `🎊 ${ev.tipo}`, EV_STATUS_LABELS[ev.estatus]||ev.estatus].forEach(txt => {
    const chip = document.createElement('span'); chip.className = 'ev-det-chip'; chip.textContent = txt; meta.appendChild(chip);
  });
  // Show/hide elementos section
  const showElem = EV_STATUS_SHOW_ELEMENTS.includes(ev.estatus);
  document.getElementById('evd-elementos-section').style.display = showElem ? '' : 'none';
  if (showElem) renderEvElems(ev);
}

function renderEvElems(ev) {
  const list  = document.getElementById('evd-elem-list');
  const empty = document.getElementById('evd-elem-empty');
  list.innerHTML = '';
  const elems = ev.elementos || [];
  if (elems.length === 0) { list.appendChild(empty); empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  elems.forEach((el, idx) => {
    const item = document.createElement('div'); item.className = 'ev-elem-item';
    item.innerHTML = `
      <span class="ev-elem-cat ${CAT_CLASS[el.cat]||''}">${CAT_LABELS[el.cat]||el.cat}</span>
      <span class="ev-elem-name">${el.name}</span>
      <button onclick="deleteEvElem(${idx})" style="background:none;border:none;cursor:pointer;color:rgba(255,255,255,.3);font-size:14px;flex-shrink:0">🗑</button>`;
    list.appendChild(item);
  });
}

async function addEvElem() {
  const name = document.getElementById('ev-elem-name').value.trim();
  const cat  = document.getElementById('ev-elem-cat').value;
  if (!name) { showToast('⚠️ Escribe el nombre del elemento'); return; }
  if (!_evDetailId) return;
  const ev = _eventos.find(e => e.id === _evDetailId); if (!ev) return;
  if (!ev.elementos) ev.elementos = [];
  ev.elementos.push({ name, cat });
  document.getElementById('ev-elem-name').value = '';
  await saveEventos();
  renderEvElems(ev);
  showToast('✅ Elemento agregado');
}

async function deleteEvElem(idx) {
  const ev = _eventos.find(e => e.id === _evDetailId); if (!ev||!ev.elementos) return;
  ev.elementos.splice(idx, 1);
  await saveEventos(); renderEvElems(ev);
  showToast('🗑 Elemento eliminado');
}

async function changeEvStatus(newStatus) {
  const ev = _eventos.find(e => e.id === _evDetailId); if (!ev) return;
  ev.estatus = newStatus;
  await saveEventos();
  renderEvDetail(_evDetailId);
  renderEvUpcoming();
  showToast('✅ Estatus actualizado');
}

buildHome();
// Init presup subscription after firebase is ready
setTimeout(initPresupSubscription, 800);
</script>
</body>
